name: Build ADF

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Clean and Install
        run: |
          rm -rf node_modules
          npm cache clean --force
          npm install

      - name: Install ADF Utilities
        run: npm install
        
      - name: List files to verify structure
        run: ls -R

      - name: Validate and Build
        run: |
         node ./node_modules/@microsoft/azure-data-factory-utilities/lib/index validate "$(pwd)/YOUR_ACTUAL_FOLDER_NAME" /subscriptions/YOUR_SUBSCRIPTION_ID/resourceGroups/YOUR_RESOURCE_GROUP/providers/Microsoft.DataFactory/factories/YOUR_DATA_FACTORY_NAME

      - name: Upload ARM Template
        uses: actions/upload-artifact@v4
        with:
          name: arm-templates
          path: ${{ github.workspace }}/ARMTemplateForFactory.json
