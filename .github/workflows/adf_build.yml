name: Build ADF

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate ADF Pipeline
        uses: Azure/data-factory-validate-action@v1
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ secrets.AZURE_RESOURCE_GROUP }}
          factoryName: ${{ secrets.AZURE_DATA_FACTORY_NAME }}
          folderPath: "."     # Important: Use dot (.) for root
