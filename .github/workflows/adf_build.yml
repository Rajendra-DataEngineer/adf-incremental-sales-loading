name: Build & Validate ADF

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Validate Data Factory
        run: |
          echo "Validating ADF Pipeline..."
          # For now, we use a simple check. We can improve later.
          echo "ADF Validation - Folder: ."
          echo "Subscription: ${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          echo "Resource Group: ${{ secrets.AZURE_RESOURCE_GROUP }}"
          echo "Factory Name: ${{ secrets.AZURE_DATA_FACTORY_NAME }}"
